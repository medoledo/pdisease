<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Disease Detector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .main-card {
            max-width: 580px;
            width: 100%;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
        }

        .header-title {
            font-weight: 700;
            color: #1b5e20;
            font-size: 1.8rem;
        }

        .upload-btn {
            border: 2px dashed #81c784;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #388e3c;
            background: #f1f8e9;
        }

        .upload-btn:hover {
            background: #dcedc8;
            border-color: #66bb6a;
        }

        .preview-img {
            max-height: 250px;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            display: none;
            margin: 0 auto;
        }

        .analyze-btn {
            background: linear-gradient(90deg, #43a047, #66bb6a);
            border: none;
            color: white;
            font-weight: 600;
            padding: 14px;
            border-radius: 50px;
            width: 100%;
            font-size: 1.1rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .analyze-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(67, 160, 71, 0.35);
        }

        .analyze-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result-card {
            display: none;
            margin-top: 24px;
            padding: 24px;
            border-radius: 16px;
            background: #fafafa;
            text-align: center;
        }

        .disease-name {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 12px;
        }

        .badge-custom {
            font-size: 0.95rem;
            padding: 8px 14px;
            border-radius: 8px;
            display: inline-block;
        }

        .confidence-text {
            font-weight: 600;
            color: #555;
            margin-top: 10px;
        }

        .footer-text {
            text-align: center;
            margin-top: 28px;
            color: #888;
            font-size: 0.85rem;
        }

        .alert-custom {
            display: none;
            margin-top: 16px;
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="text-center mb-4">
        <div style="font-size: 3rem;">🌿</div>
        <h1 class="header-title mt-2">Plant Disease Detector</h1>
        <p class="text-muted mt-2 mb-0">Upload a leaf photo — our AI will identify the disease instantly</p>
    </div>

    <div class="mb-3 text-center">
        <input type="file" id="imageInput" accept="image/*" style="display: none;">
        <div class="upload-btn" id="uploadBtn">
            <div style="font-size: 1.5rem;">📁</div>
            <div class="mt-2 fw-semibold">Click to choose an image</div>
        </div>
    </div>

    <div class="mb-3 text-center">
        <img id="preview" class="preview-img" src="" alt="Preview">
    </div>

    <button id="analyzeBtn" class="analyze-btn" disabled>Analyze Leaf 🔍</button>

    <div id="spinner" class="text-center mt-4" style="display: none;">
        <div class="spinner-border text-success" role="status"></div>
        <div class="mt-2 text-success fw-semibold">Analyzing...</div>
    </div>

    <div id="resultCard" class="result-card">
        <div id="diseaseName" class="disease-name"></div>
        <div id="badgeContainer" class="mb-3"></div>
        <div class="progress" style="height: 24px; border-radius: 12px;">
            <div id="confidenceBar" class="progress-bar" role="progressbar" style="width: 0%; transition: width 0.6s ease;" aria-valuemin="0" aria-valuemax="100"></div>
        </div>
        <div id="confidenceText" class="confidence-text"></div>
    </div>

    <div id="errorAlert" class="alert alert-danger alert-custom" role="alert"></div>

    <div class="footer-text">
        Powered by MobileNetV2 · 38 Disease Classes · ~96% Accuracy
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const imageInput = document.getElementById('imageInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const preview = document.getElementById('preview');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const spinner = document.getElementById('spinner');
    const resultCard = document.getElementById('resultCard');
    const diseaseName = document.getElementById('diseaseName');
    const badgeContainer = document.getElementById('badgeContainer');
    const confidenceBar = document.getElementById('confidenceBar');
    const confidenceText = document.getElementById('confidenceText');
    const errorAlert = document.getElementById('errorAlert');

    uploadBtn.addEventListener('click', () => imageInput.click());

    imageInput.addEventListener('change', function () {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function (e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
                analyzeBtn.disabled = false;
            };
            reader.readAsDataURL(file);
        }
    });

    analyzeBtn.addEventListener('click', async function () {
        const file = imageInput.files[0];
        if (!file) return;

        spinner.style.display = 'block';
        resultCard.style.display = 'none';
        errorAlert.style.display = 'none';
        errorAlert.textContent = '';
        analyzeBtn.disabled = true;

        const formData = new FormData();
        formData.append('image', file);

        try {
            const response = await fetch('/api/predict/', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (!response.ok || data.error) {
                throw new Error(data.error || 'Something went wrong');
            }

            const disease = data.disease;
            const confidenceVal = parseFloat(data.confidence);

            diseaseName.textContent = disease;

            const isHealthy = disease.toLowerCase().includes('healthy');
            if (isHealthy) {
                badgeContainer.innerHTML = '<span class="badge badge-custom bg-success">✅ Healthy</span>';
                confidenceBar.className = 'progress-bar bg-success';
            } else {
                badgeContainer.innerHTML = '<span class="badge badge-custom bg-danger">⚠️ Disease Detected</span>';
                confidenceBar.className = 'progress-bar bg-danger';
            }

            confidenceBar.style.width = confidenceVal + '%';
            confidenceBar.setAttribute('aria-valuenow', confidenceVal);
            confidenceText.textContent = 'Confidence: ' + data.confidence;

            resultCard.style.display = 'block';
        } catch (err) {
            errorAlert.textContent = err.message;
            errorAlert.style.display = 'block';
        } finally {
            spinner.style.display = 'none';
            analyzeBtn.disabled = false;
        }
    });
</script>

</body>
</html>
